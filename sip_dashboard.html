<body class="body-bg-full profile-page" style="background-image: url(../../images/bg1.jpg)">

<div id="wrapper" class="row wrapper">
    <style>
    .profile-page .login-center {
             min-height: 400px;
         }
    .display-success{
        width: 300px;
        border: 1px solid #D8D8D8;
        padding: 10px;
        border-radius: 5px;
        font-family: Arial;
        font-size: 11px;
        text-transform: uppercase;
        background-color: rgb(236, 255, 216);
        color: green;
        text-align: center;
        margin-top: 30px;
        margin-bottom: 20px;
    }
</style>



<div style="margin-top: 100px" class="col-10 ml-sm-auto col-sm-6 col-md-4 ml-md-auto login-center mx-auto">
    <div style="margin-bottom: 50px" class="navbar-header text-center">
        <a href="">
            <img width="200px" alt="" src="/images/logo.png">
        </a>
    </div>
    <h1 style="text-align: center; font-size: 25px; margin-top: -30px; padding-bottom: 30px">Welcome to UPSA Student Portal</h1>
            <!-- /.navbar-header -->
    <form class="form-material" id="login-form" action="/home/processStudentLogin/" method="post" >
        <div class="form-group">
            <input type="text" class="form-control form-control-line" placeholder="Index Number" name="index_num" id="index_num" ><!--readonly = "readonly"-->
            <label for="example-email">Index Number</label>
        </div>
        <div class="form-group">
            <input type="password" placeholder="Date of Birth eg.31-12-1970" name="stud_pswrd" class="form-control form-control-line"><!--readonly = "readonly"-->
            <label>Password</label>
        </div>
        <div class="form-group">
            <button name="button" class="btn btn-block btn-lg btn-color-scheme ripple" type="submit">Login</button>
        </div>
        <div style="padding-bottom: 50px" class="form-group no-gutters mb-0">
            <div class="col-md-12 d-flex">

                <a href="/home/studPassReset/" id="to-recover" class="my-auto pb-2 text-right"><i class="fa fa-lock mr-1"></i>Forgot Password?</a>
            </div>
            <!-- /.row -->
        </div>
        <!-- /.form-group -->
    </form>
    <div class="loader">
        <h2 class="login-title">Proccessing . . .</h2>
        <span><img src="/images/ajax-loader2.gif" /></span>
    </div>
    <div class="message">
        <h2 class="login-title">Login Failed</h2>
        <span><a class="relogin" href="#">Click here to login again</a></span>
    </div>
</div>
